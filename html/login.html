<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LMS</title>
    <link rel="stylesheet" href="sample1.css">
</head>

<body>
<div class="navbar">
    <a href="sample.html">Home</a>
    <a href="signup.html">Sign Up</a>
    <a href="about.html">About</a>
</div>
<!-- Form -->
       <form class="form-box" id="loginForm">
    <h2 class="form-title">Login to LMS</h2>

    <div class="form-group">
        <label>Name</label>
        <input type="text" placeholder="Enter your name" required>
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
    </div>

    <p class="forgot">
        <a href="#">Forgot your password?</a>
    </p>

    <div class="buttons">
        <button type="submit" class="btn primary">Login</button>
        <button type="reset" class="btn secondary">Cancel</button>
    </div>
    <p class="switch">
    Don't have an account? <a href="signup.html">Sign Up</a>
    </p>
</form>
    </div>

    <!-- PASTE HERE -->
<script type="module">

// Import Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔴 PASTE YOUR CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyDjUAi8utCfIVXykVRN5qZ1ArvwvN2ZRgU",
  authDomain: "lms-project-90cdd.firebaseapp.com",
  projectId: "lms-project-90cdd",
  appId: "1:249187940167:web:705f1cfde2c587d8327e62"
};

// Initialize
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// SIGNUP
const signupForm = document.getElementById("signupForm");

if (signupForm) {
    signupForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const email = signupForm.querySelector('input[type="email"]').value;
        const password = signupForm.querySelector('input[type="password"]').value;

        try {
            await createUserWithEmailAndPassword(auth, email, password);
            alert("Signup successful ✅");
            window.location.href = "dashboard.html";
        } catch (err) {
            alert(err.message);
        }
    });
}

// LOGIN
const loginForm = document.getElementById("loginForm");

if (loginForm) {
    loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = loginForm.querySelector('input[type="email"]').value;
        const password = loginForm.querySelector('input[type="password"]').value;

        try {
            await signInWithEmailAndPassword(auth, email, password);
            alert("Login successful ✅");
            window.location.href = "dashboard.html";
        } catch (err) {
            alert("Invalid credentials ❌");
        }
    });
}

</script>
<!-- END -->


</body>
</html>
